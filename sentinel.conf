# 1. 기본 포트
port 26379

# 2. 호스트네임 해석 허용 (유지)
# sentinel resolve-hostnames yes

# 3. 마스터 감시 설정
# 여기서 'redis-master' 대신 도커 내부 IP를 직접 적어주는 것이 가장 확실하지만,
# 만약 계속 이름을 쓰고 싶다면 아래 5번 설정을 반드시 추가해야 합니다.
sentinel monitor mymaster 172.23.0.2 6379 2

# 4. 장애 판단 시간 (5초)
sentinel down-after-milliseconds mymaster 5000

# 5. 장애 복구 타임아웃 및 스크립트 설정 보강
# 장애 복구 절차가 시작된 후 너무 오래 걸리면 강제로 다음 단계로 넘어가게 합니다.
sentinel failover-timeout mymaster 10000

# 6. 호스트네임 발표 설정
# 센티널이 다른 동료들에게 정보를 줄 때 IP 대신 이름을 쓰도록 강제합니다.
# sentinel announce-hostnames yes